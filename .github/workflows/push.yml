name: 天气资讯推送

on:
  schedule:
    - cron: '30 9 * * *'   # 每天早上9:30定时推送
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: 执行推送脚本
        run: python push.py
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
